<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gear-PumpNation</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!--BAR&MENU-->
<header class="topbar">
    <div class="left-section">
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
        <input type="text" placeholder="Search..." class="search-bar">
    </div>

    <a href="index.html" class="logo">
        Pump Nation
    </a>

    <div class="right-section">
        <a href="favourites.html" class="icon-btn">
            <i class="fa-regular fa-heart"></i>
        </a>
        <a href="cart.html" class="icon-btn">
            <i class="fa-solid fa-cart-shopping"></i>
        </a>
    </div>
</header>

<nav id="sideMenu" class="side-menu">
    <a href="gear.html">Gear</a>
    <a href="equipment.html">Equipment</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
</nav>

<!--PRODUCTS-->
<div class="equipment-bg">
    <section class="equipment">
        <h2>Gear</h2>

        <div class="grid">

            <div class="product"
                 data-id="7"
                 data-name="Windbreaker"
                 data-price="69.99"
                 data-img="imgs/jacket.jpg"
                 onclick="openProduct(7)">
                <div class="product-img">
                    <img src="imgs/jacket.jpg" alt="Windbreaker">
                    <i class="fa-regular fa-heart fav-icon"></i>
                    <i class="fa-solid fa-cart-shopping cart-icon"></i>
                </div>
                <h3>Windbreaker</h3>
                <p class="price">$69.99</p>
            </div>

            <div class="product"
                 data-id="8"
                 data-name="Women's Leggings"
                 data-price="19.99"
                 data-img="imgs/leg.jpg"
                 onclick="openProduct(8)">
                <div class="product-img">
                    <img src="imgs/leg.jpg" alt="Women's Leggings">
                    <i class="fa-regular fa-heart fav-icon"></i>
                    <i class="fa-solid fa-cart-shopping cart-icon"></i>
                </div>
                <h3>Women's Leggings</h3>
                <p class="price">$19.99</p>
            </div>

            <div class="product"
                 data-id="9"
                 data-name="T-Shirt"
                 data-price="25.00"
                 data-img="imgs/shirt.jpg"
                 onclick="openProduct(9)">
                <div class="product-img">
                    <img src="imgs/shirt.jpg" alt="T-Shirt">
                    <i class="fa-regular fa-heart fav-icon"></i>
                    <i class="fa-solid fa-cart-shopping cart-icon"></i>
                </div>
                <h3>T-Shirt</h3>
                <p class="price">$25.00</p>
            </div>

            <div class="product"
                 data-id="10"
                 data-name="Running Shoes"
                 data-price="129.99"
                 data-img="imgs/shoe.jpg"
                 onclick="openProduct(10)">
                <div class="product-img">
                    <img src="imgs/shoe.jpg" alt="Running Shoes">
                    <i class="fa-regular fa-heart fav-icon"></i>
                    <i class="fa-solid fa-cart-shopping cart-icon"></i>
                </div>
                <h3>Running Shoes</h3>
                <p class="price">$129.99</p>
            </div>

            <div class="product"
                 data-id="11"
                 data-name="Running Shoes (Pro)"
                 data-price="115.00"
                 data-img="imgs/shoe2.jpg"
                 onclick="openProduct(11)">
                <div class="product-img">
                    <img src="imgs/shoe2.jpg" alt="Running Shoes (Pro)">
                    <i class="fa-regular fa-heart fav-icon"></i>
                    <i class="fa-solid fa-cart-shopping cart-icon"></i>
                </div>
                <h3>Running Shoes (Pro)</h3>
                <p class="price">$115.00</p>
            </div>

            <div class="product"
                 data-id="12"
                 data-name="Women's Tank Top"
                 data-price="15.00"
                 data-img="imgs/tank.jpg"
                 onclick="openProduct(12)">
                <div class="product-img">
                    <img src="imgs/tank.jpg" alt="Women's Tank Top">
                    <i class="fa-regular fa-heart fav-icon"></i>
                    <i class="fa-solid fa-cart-shopping cart-icon"></i>
                </div>
                <h3>Women's Tank Top</h3>
                <p class="price">$15.00</p>
            </div>

        </div>
    </section>
</div>

<script src="script.js"></script>
</body>
</html>
