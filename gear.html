<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gear-PumpNation</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- TOP BAR (same as homepage) -->
<header class="topbar">
    <div class="left-section">
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
        <input type="text" placeholder="Search..." class="search-bar">
    </div>

    <a href="index.html" class="logo">
        Pump Nation
    </a>

    <div class="right-section">
        <button class="icon-btn"><i class="fa-regular fa-heart"></i></button>
        <button class="icon-btn"><i class="fa-solid fa-cart-shopping"></i></button>
    </div>
</header>

<!-- SIDE MENU -->
<nav id="sideMenu" class="side-menu">
    <a href="gear.html">Gear</a>
    <a href="equipment.html">Equipment</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
</nav>

<!-- BACKGROUND WRAPPER -->
<div class="equipment-bg">

    <section class="equipment">
        <h2>Gear</h2>

        <div class="grid">

            <div class="product" onclick="openProduct(7)">
    
                 <div class="product-img">
                     <img src="imgs/jacket.jpg">

                     <!-- HEART -->
                     <i class="fa-regular fa-heart fav-icon"></i>

                     <!-- CART -->
                     <i class="fa-solid fa-cart-shopping cart-icon"></i>
                 </div>

                 <h3>Windbreaker</h3>
                 <p class="price">$69.99</p>

            </div>

            <div class="product" onclick="openProduct(8)">
                <div class="product-img">
                     <img src="imgs/leg.jpg">

                     <!-- HEART -->
                     <i class="fa-regular fa-heart fav-icon"></i>

                     <!-- CART -->
                     <i class="fa-solid fa-cart-shopping cart-icon"></i>
                 </div>
                 <h3>Women's Leggings</h3>
                 <p class="price">$19.99</p>
            </div>

            <div class="product" onclick="openProduct(9)">
                <div class="product-img">
                     <img src="imgs/shirt.jpg">

                     <!-- HEART -->
                     <i class="fa-regular fa-heart fav-icon"></i>

                     <!-- CART -->
                     <i class="fa-solid fa-cart-shopping cart-icon"></i>
                 </div>
                 <h3>T-Shirt</h3>
                 <p class="price">$25.00</p>
            </div>

            <div class="product" onclick="openProduct(10)">
                <div class="product-img">
                     <img src="imgs/shoe.jpg">

                     <!-- HEART -->
                     <i class="fa-regular fa-heart fav-icon"></i>

                     <!-- CART -->
                     <i class="fa-solid fa-cart-shopping cart-icon"></i>
                 </div>
                 <h3>Running Shoes</h3>
                 <p class="price">$129.99</p>
            </div>

            <div class="product" onclick="openProduct(11)">
                <div class="product-img">
                     <img src="imgs/shoe2.jpg">

                     <!-- HEART -->
                     <i class="fa-regular fa-heart fav-icon"></i>

                     <!-- CART -->
                     <i class="fa-solid fa-cart-shopping cart-icon"></i>
                 </div>
                 <h3>Running Shoes (Pro)</h3>
                 <p class="price">$115.00</p>
            </div>

            <div class="product" onclick="openProduct(12)">
                <div class="product-img">
                     <img src="imgs/tank.jpg">

                     <!-- HEART -->
                     <i class="fa-regular fa-heart fav-icon"></i>

                     <!-- CART -->
                     <i class="fa-solid fa-cart-shopping cart-icon"></i>
                 </div>
                 <h3>Women's Tank Top</h3>
                 <p class="price">$15.00</p>
            </div>

        </div>
    </section>

</div>

<script src="script.js"></script>
</body>
</html>
