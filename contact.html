<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact - Pump Nation</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
    <div class="left-section">
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
        <input type="text" placeholder="Search..." class="search-bar">
    </div>

    <a href="index.html" class="logo">Pump Nation</a>

    <div class="right-section">
        <button class="icon-btn"><i class="fa-regular fa-heart"></i></button>
        <button class="icon-btn"><i class="fa-solid fa-cart-shopping"></i></button>
    </div>
</header>

<!-- SIDE MENU -->
<nav id="sideMenu" class="side-menu">
    <a href="gear.html">Gear</a>
    <a href="equipment.html">Equipment</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
</nav>

<!-- BACKGROUND -->
<div class="contact-bg">

    <section class="contact-container">

        <!-- LEFT SIDE -->
        <div class="contact-left">
            <h1>Contact Us</h1>

            <p>Got questions? Reach out to us anytime.</p>

            <div class="contact-links">
                <a href="#"><i class="fa-brands fa-instagram"></i> Instagram</a>
                <a href="#"><i class="fa-solid fa-envelope"></i> Email</a>
                <a href="#"><i class="fa-brands fa-x-twitter"></i> Twitter / X</a>
            </div>
        </div>

        <!-- RIGHT SIDE (MAP) -->
        <div class="contact-right">
            <iframe 
                src="https://www.google.com/maps?q=Zagreb&output=embed"
                width="100%" 
                height="100%" 
                style="border:0;" 
                allowfullscreen="" 
                loading="lazy">
            </iframe>
        </div>

    </section>

</div>

<script src="script.js"></script>
</body>
</html>
