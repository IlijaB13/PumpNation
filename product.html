<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product - Pump Nation</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="product-page-body">

<!--BAR&MENU-->
<header class="topbar">
    <div class="left-section">
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
    </div>

    <a href="index.html" class="logo">Pump Nation</a>

    <div class="right-section">
        <a href="favourites.html" class="icon-btn">
            <i class="fa-regular fa-heart"></i>
        </a>
        <a href="cart.html" class="icon-btn">
            <i class="fa-solid fa-cart-shopping"></i>
        </a>
    </div>
</header>

<nav id="sideMenu" class="side-menu">
    <a href="gear.html">Gear</a>
    <a href="equipment.html">Equipment</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
</nav>

<!--MAIN-->
<div class="product-wrapper">
    <div class="product-box">

        <div class="left-side">
            <h1 id="productName"></h1>
            <img id="productImg" alt="">
            <p class="price" id="productPrice"></p>
        </div>

        <div class="right-side">
            <div class="desc-box">
                <p id="productDesc"></p>
            </div>

            <div id="sizeContainer" class="size-container" style="display: none;">
                <label for="sizeSelect">Select Size:</label>
                <select id="sizeSelect">
                    <option value="">Choose size</option>
                </select>
            </div>

            <button class="add-cart" id="addToCartBtn">
                Add to Cart <i class="fa-solid fa-cart-shopping"></i>
            </button>
        </div>

    </div>
</div>

<!--POPUP-->
<div id="customModal" class="custom-modal">
    <div class="custom-modal-content">
        <span class="close-modal" id="closeModal">&times;</span>
        <p id="modalMessage">Message goes here</p>
        <button id="modalOkBtn" class="modal-btn">OK</button>
    </div>
</div>

<div id="toast" class="toast-message">Added to cart!</div>

<script src="script.js"></script>
</body>
</html>
