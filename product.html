<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product-Pump Nation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="product-page-body">

<header class="topbar">
    <div class="left-section">
        <button class="menu-icon" onclick="toggleMenu()" aria-label="Open menu" aria-controls="sideMenu" aria-expanded="false" type="button">☰</button>

        <div class="search-wrap">
            <label for="globalSearch" class="sr-only">Search products</label>
            <input
                type="text"
                id="globalSearch"
                placeholder="Search..."
                class="search-bar"
                onkeydown="handleSearchKey(event)"
                oninput="handleLiveSearch(event)"
            >
        </div>
    </div>

    <a href="index.html" class="logo">Pump Nation</a>

    <div class="right-section">
        <a href="favourites.html" class="icon-btn" aria-label="Open favourites">
            <i class="fa-regular fa-heart" aria-hidden="true"></i>
        </a>
        <a href="cart.html" class="icon-btn" aria-label="Open cart">
            <i class="fa-solid fa-cart-shopping" aria-hidden="true"></i>
        </a>
    </div>
</header>

<nav id="sideMenu" class="side-menu" aria-label="Main navigation">
    <a href="index.html">Home</a>
    <a href="gear.html">Gear</a>
    <a href="equipment.html">Equipment</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
</nav>

<main id="mainContent">
    <div class="product-wrapper">
        <div class="product-box">

            <div class="left-side">
                <h1 id="productName"></h1>
                <img id="productImg" alt="">
                <p class="price" id="productPrice"></p>
            </div>

            <div class="right-side">
                <div class="desc-box">
                    <p id="productDesc"></p>
                </div>

                <div id="sizeContainer" class="size-container" style="display: none;">
                    <label for="sizeSelect">Select Size:</label>
                    <select id="sizeSelect">
                        <option value="">Choose size</option>
                    </select>
                </div>

                <button class="add-cart" id="addToCartBtn" type="button">
                    Add to Cart <i class="fa-solid fa-cart-shopping" aria-hidden="true"></i>
                </button>
            </div>

        </div>
    </div>
</main>

<div id="customModal" class="custom-modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalMessage">
    <div class="custom-modal-content">
        <button class="close-modal" id="closeModal" type="button" aria-label="Close message">&times;</button>
        <h2 id="modalTitle">Notice</h2>
        <p id="modalMessage">Message goes here</p>
        <button id="modalOkBtn" class="modal-btn" type="button">OK</button>
    </div>
</div>

<div id="toast" class="toast-message" aria-live="polite">Added to cart!</div>

<script src="script.js"></script>
</body>
</html>
